<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #f2f2f7; }

  #divicw { width: 100%; height: 100%; position: relative; }

  /* Hide the default IMI floating chat bubble */
  iframe.chatbutton,
  .chatbutton,
  [class*="chatbutton"],
  #divchatmain {
    display: none !important;
    width: 0 !important;
    height: 0 !important;
    opacity: 0 !important;
    pointer-events: none !important;
  }

  /* Force the IMI chat window iframe to fill the viewport */
  iframe:not(.chatbutton) {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    max-width: 100% !important;
    max-height: 100% !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    z-index: 1;
  }

  .loading-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    color: #8e8e93;
    font-size: 14px;
    z-index: 0;
  }
  .loading-spinner {
    width: 32px; height: 32px;
    border: 3px solid #e5e5ea;
    border-top-color: #049fd9;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="loading-state" id="loadingState">
  <div class="loading-spinner"></div>
  <div>Connecting to agent...</div>
</div>

<div id="divicw" data-bind="1037DA7E-AED7-49C9-BF31-96C35755BA74" data-org="" data-guid="b4c93442-7827-4944-b60b-535e61409fae"></div>

<script>
(function() {
  var e = document.getElementById("divicw");
  var t = document.createElement("script");
  t.src = "https://media.imi.chat/widget/js/imichatinit.js?t=" + new Date().toISOString();
  e.insertAdjacentElement("afterend", t);

  t.addEventListener("load", function() {
    console.log("IMI script loaded in chat frame");
    if (typeof IMIChatInit !== 'undefined' && IMIChatInit.init) {
      try {
        IMIChatInit.init();
        console.log("IMIChatInit.init() called");
        // Auto-open the chat after init completes
        setTimeout(function() {
          if (typeof IMIChatInit !== 'undefined' && IMIChatInit.chatswitchicon) {
            IMIChatInit.chatswitchicon(1);
            console.log("Chat widget opened");
            // Hide loading spinner once widget is active
            var ls = document.getElementById('loadingState');
            if (ls) ls.style.display = 'none';
          }
        }, 1000);
      } catch(err) {
        console.warn("IMI init error:", err);
      }
    }
  });

  t.addEventListener("error", function() {
    console.error("Failed to load IMI script");
    var ls = document.getElementById('loadingState');
    if (ls) ls.innerHTML =
      '<div style="font-size:40px;">⚠️</div>' +
      '<div>Unable to connect to chat.<br>Please try again later.</div>';
  });
})();
</script>
</body>
</html>
