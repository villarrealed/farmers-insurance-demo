<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMI Chat Widget Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; background: #1c1c1e; color: #e5e5ea; min-height: 100vh; padding: 24px; }
  h1 { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #636366; margin-bottom: 20px; font-family: monospace; }

  .grid { display: grid; grid-template-columns: 320px 1fr; gap: 16px; align-items: start; }

  .card { background: #2c2c2e; border-radius: 14px; padding: 20px; }
  .card-title { font-size: 11px; font-weight: 700; color: #636366; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 14px; }

  .field { margin-bottom: 12px; }
  .field label { font-size: 11px; color: #8e8e93; display: block; margin-bottom: 4px; }
  .field value { font-size: 13px; color: #e5e5ea; font-family: monospace; word-break: break-all; }

  .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; background: #636366; }
  .dot.ok { background: #30d158; }
  .dot.err { background: #ff453a; }
  .dot.warn { background: #ffd60a; }
  .dot.pulse { animation: pulse 1s infinite; background: #0a84ff; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .status-label { font-size: 13px; color: #e5e5ea; }

  button { width: 100%; margin-top: 6px; background: linear-gradient(135deg,#0a84ff,#005cde); color: #fff; border: none; border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: .4; cursor: default; }
  button.secondary { background: #3a3a3c; margin-top: 8px; font-size: 13px; }

  /* API results */
  .api-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid #3a3a3c; font-size: 12px; }
  .api-row:last-child { border-bottom: none; }
  .badge { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 5px; flex-shrink: 0; }
  .badge-200 { background: #1a3a2a; color: #30d158; }
  .badge-500 { background: #3a1a1a; color: #ff453a; }
  .badge-err { background: #3a2a00; color: #ffd60a; }
  .badge-pending { background: #1a2a3a; color: #0a84ff; }
  .api-url { color: #8e8e93; word-break: break-all; flex: 1; }
  .api-detail { color: #636366; font-size: 11px; margin-top: 3px; }

  /* Console log */
  #logPanel { background: #141414; border-radius: 14px; padding: 16px; font-family: monospace; font-size: 12px; height: 520px; overflow-y: auto; }
  .log-entry { padding: 3px 0; border-bottom: 1px solid #222; line-height: 1.5; display: flex; gap: 8px; }
  .log-time { color: #636366; flex-shrink: 0; }
  .log-msg { word-break: break-all; }
  .log-info  .log-msg { color: #e5e5ea; }
  .log-warn  .log-msg { color: #ffd60a; }
  .log-error .log-msg { color: #ff453a; }
  .log-net   .log-msg { color: #0a84ff; }
  .log-ok    .log-msg { color: #30d158; }
  .log-post  .log-msg { color: #bf5af2; }

  .clear-btn { float: right; font-size: 11px; color: #636366; cursor: pointer; background: none; border: none; padding: 0; width: auto; margin: 0; }
  .clear-btn:hover { color: #8e8e93; }
</style>
</head>
