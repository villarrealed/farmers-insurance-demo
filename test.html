<title>IMI Chat Widget Test</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f2f2f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .card { background: #fff; border-radius: 16px; padding: 32px; max-width: 480px; width: 90%; box-shadow: 0 4px 20px rgba(0,0,0,.1); text-align: center; }
  h1 { font-size: 20px; color: #1c1c1e; margin-bottom: 8px; }
  p { font-size: 14px; color: #8e8e93; margin-bottom: 24px; line-height: 1.5; }
  button { background: linear-gradient(135deg,#049fd9,#005cde); color: #fff; border: none; border-radius: 12px; padding: 12px 28px; font-size: 16px; font-weight: 600; cursor: pointer; }
  .status { margin-top: 16px; font-size: 12px; color: #8e8e93; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ff3b30; margin-right: 5px; }
  .dot.ready { background: #34c759; }
</style>
</head>
<body>
<div class="card">
  <h1>IMI Chat Widget Test</h1>
  <p>Entry point: <code>92542134-7d51-4af1-854a-168c7f7b2963</code><br>Click the button to open the chat widget.</p>
  <button onclick="openChat()">Open Chat Widget</button>
  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Initialising…</span>
  </div>
</div>

<div id="divicw"
     style="visibility:hidden;"
     data-bind="92542134-7d51-4af1-854a-168c7f7b2963"
     data-org=""
     data-guid="b4c93442-7827-4944-b60b-535e61409fae"></div>

<script>
var _ready = false;

// Poll for IMIChatInit readiness and update status
(function poll() {
  var attempts = 0;
  var timer = setInterval(function() {
    attempts++;
    if (typeof IMIChatInit !== 'undefined' && typeof IMIChatInit.chatswitchicon === 'function') {
      clearInterval(timer);
      _ready = true;
      document.getElementById('statusDot').classList.add('ready');
      document.getElementById('statusText').textContent = 'Widget ready — click to open';
    } else if (attempts > 80) {
      clearInterval(timer);
      document.getElementById('statusText').textContent = 'Widget failed to load — check console';
    }
  }, 250);
})();

function openChat() {
  var divicw = document.getElementById('divicw');
  if (divicw) { divicw.style.visibility = 'visible'; divicw.style.display = 'block'; }
  if (_ready) {
    IMIChatInit.chatswitchicon(1);
  } else {
    document.getElementById('statusText').textContent = 'Still loading, try again in a moment…';
  }
}
</script>
