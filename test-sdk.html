<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Webex Connect SDK — Test Harness</title>
  <style>
    :root {
      --farmers-red: #cc2228;
      --farmers-red-dark: #a31b20;
      --bg: #f5f5f7;
      --panel: #ffffff;
      --border: #e5e5ea;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --ok: #34c759;
      --warn: #ff9500;
      --err: #ff3b30;
      --info: #007aff;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    header {
      background: var(--farmers-red);
      color: #fff;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    header .env { font-size: 12px; opacity: .85; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 16px;
      padding: 16px;
      height: calc(100vh - 50px);
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      overflow: auto;
    }
    .panel h2 {
      margin: 0 0 12px 0;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
    }
    .row { margin-bottom: 10px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    input, button, select {
      font: inherit;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      width: 100%;
    }
    button {
      background: var(--farmers-red);
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover:not(:disabled) { background: var(--farmers-red-dark); }
    button:disabled { background: #c7c7cc; cursor: not-allowed; }
    button.secondary { background: #fff; color: var(--text); border: 1px solid var(--border); }
    button.secondary:hover:not(:disabled) { background: #f2f2f7; }

    .status-grid { display: grid; grid-template-columns: 1fr auto; gap: 6px 10px; font-size: 13px; align-items: center; }
    .status-grid .label { color: var(--muted); }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      background: #e5e5ea;
      color: var(--muted);
    }
    .badge.ok { background: #d4f4dc; color: #1a7430; }
    .badge.warn { background: #fff1d6; color: #8a5a00; }
    .badge.err { background: #ffd6d6; color: #8a1a1a; }
    .badge.info { background: #d6e8ff; color: #003a8c; }

    #log {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11.5px;
      line-height: 1.5;
      background: #1d1d1f;
      color: #f5f5f7;
      padding: 12px;
      border-radius: 8px;
      height: 320px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .log-line { margin-bottom: 2px; }
    .log-time { color: #8e8e93; margin-right: 8px; }
    .log-level-info  { color: #6ab7ff; }
    .log-level-ok    { color: #5fd97c; }
    .log-level-warn  { color: #ffb84d; }
    .log-level-err   { color: #ff7a7a; }
    .log-level-event { color: #d97cff; }

    .chat {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
      min-height: 200px;
    }
    .msg {
      max-width: 75%;
      padding: 8px 12px;
      border-radius: 14px;
      margin-bottom: 8px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }
    .msg.out { background: var(--farmers-red); color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
    .msg.in  { background: #e5e5ea; color: #1d1d1f; margin-right: auto; border-bottom-left-radius: 4px; }
    .msg.sys { background: transparent; color: var(--muted); font-style: italic; font-size: 12px; text-align: center; max-width: 100%; padding: 4px; }
    .msg-meta { font-size: 10px; opacity: .7; margin-top: 2px; }

    .composer { display: flex; gap: 8px; }
    .composer input { flex: 1; }
    .composer button { width: auto; padding: 8px 16px; }

    .btn-row { display: flex; gap: 8px; margin-top: 8px; }
    .btn-row button { flex: 1; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; background: #f2f2f7; padding: 1px 5px; border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1>🧪 Webex Connect SDK — Test Harness</h1>
    <span class="env">App: <strong id="hAppId">—</strong> · Region: <strong id="hRegion">US</strong></span>
  </header>

  <div class="layout">
    <!-- LEFT: Controls + status + log -->
    <div class="panel">
      <h2>1. Configuration</h2>
      <div class="row">
        <label>Guest userId (random by default)</label>
        <input id="userId" type="text" />
      </div>
      <div class="row">
        <label>Display name (optional, sent in pre-chat)</label>
        <input id="displayName" type="text" placeholder="Ed Villarreal" />
      </div>
      <div class="row">
        <label>Email (optional)</label>
        <input id="email" type="email" placeholder="ed.villarreal@example.com" />
      </div>

      <h2 style="margin-top:18px;">2. Lifecycle</h2>
      <div class="status-grid">
        <span class="label">SDK loaded</span>             <span id="sStatus_sdk" class="badge">pending</span>
        <span class="label">Startup</span>                <span id="sStatus_startup" class="badge">pending</span>
        <span class="label">Registered</span>             <span id="sStatus_register" class="badge">pending</span>
        <span class="label">Connection</span>             <span id="sStatus_conn" class="badge">pending</span>
        <span class="label">Active thread</span>          <span id="sStatus_thread" class="badge">none</span>
      </div>
      <div class="btn-row">
        <button id="btnRegister">Register guest</button>
        <button id="btnUnregister" class="secondary" disabled>Unregister</button>
      </div>
      <div class="btn-row">
        <button id="btnConnect" class="secondary" disabled>Connect</button>
        <button id="btnDisconnect" class="secondary" disabled>Disconnect</button>
      </div>
      <div class="btn-row">
        <button id="btnNewThread" class="secondary" disabled>Create thread</button>
        <button id="btnFetchThreads" class="secondary" disabled>Fetch threads</button>
      </div>

      <h2 style="margin-top:18px;">3. Event log</h2>
      <div id="log"></div>
      <div class="btn-row">
        <button class="secondary" onclick="document.getElementById('log').innerHTML=''">Clear log</button>
      </div>
    </div>

    <!-- RIGHT: Chat preview -->
    <div class="panel chat">
      <h2>Chat preview</h2>
      <div id="messages" class="messages">
        <div class="msg sys">Register a guest user, connect, then create a thread to start chatting.</div>
      </div>
      <div class="composer">
        <input id="composer" type="text" placeholder="Type a message…" disabled />
        <button id="btnSend" disabled>Send</button>
      </div>
    </div>
  </div>

  <!-- Webex Connect SDK + tenant config
       NOTE: SDK v1.8.0 OFFICIALLY REQUIRES jQuery 1.12.4 (per Cisco quickstart).
       jQuery 3.x is NOT supported and throws "$.ajax is not a function". -->
  <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
  <script>
    if (typeof window.jQuery === 'function') {
      window.$ = window.jQuery;
      console.log('[preflight] jQuery loaded:', window.jQuery.fn.jquery, '· $.ajax type:', typeof window.$.ajax);
    } else {
      console.error('[preflight] jQuery FAILED to load from CDN');
    }
  </script>
  <script src="sdk-vendor/imi-environments.js"></script>
  <script src="sdk-vendor/webex-connect-sdk.min.js"></script>
  <script>
    console.log('[post-sdk] window.$ === jQuery:', window.$ === window.jQuery,
                '· $.ajax type:', typeof window.$ && typeof window.$.ajax);
  </script>

  <script>
    /* ─────────────────────────────────────────────────────────────
       Webex Connect SDK test harness
       Goal: verify startup → register → connect → publish round-trip
       Uses the IMI.* namespace (preserved in v1.8 minified SDK).
       ───────────────────────────────────────────────────────────── */

    const el = (id) => document.getElementById(id);
    const log = (msg, level = 'info') => {
      const line = document.createElement('div');
      line.className = 'log-line';
      const t = new Date().toTimeString().slice(0, 8);
      line.innerHTML = `<span class="log-time">${t}</span><span class="log-level-${level}">${msg}</span>`;
      const box = el('log');
      box.appendChild(line);
      box.scrollTop = box.scrollHeight;
    };
    const setBadge = (id, text, kind = '') => {
      const node = el(id);
      node.textContent = text;
      node.className = 'badge' + (kind ? ' ' + kind : '');
    };
    const addMsg = (text, dir = 'in', meta = '') => {
      const m = document.createElement('div');
      m.className = 'msg ' + dir;
      m.textContent = text;
      if (meta) {
        const x = document.createElement('div');
        x.className = 'msg-meta';
        x.textContent = meta;
        m.appendChild(x);
      }
      el('messages').appendChild(m);
      el('messages').scrollTop = el('messages').scrollHeight;
    };

    let activeThread   = null;   // typed IMI.ICThread instance (needed by publishMessage)
    let activeThreadId = null;   // server-assigned id (string), for display
    let currentUserId  = null;
    let pendingForm    = null;   // { message, transactionId, fields[] } for current pre-chat form

    // ── 0. Confirm SDK + env loaded ──────────────────────────────
    function preflight() {
      // imi-environments.js exposes window.imiEnvironments
      const envOk = typeof imiEnvironments === 'object' && imiEnvironments?.default?.asset?.appId;
      const sdkOk = typeof IMI === 'object' && typeof IMI.IMIconnect === 'object';

      if (!envOk) {
        setBadge('sStatus_sdk', 'env missing', 'err');
        log('imi-environments.js not loaded or malformed', 'err');
        return false;
      }
      if (!sdkOk) {
        setBadge('sStatus_sdk', 'sdk missing', 'err');
        log('webex-connect-sdk.min.js did not expose IMI namespace', 'err');
        return false;
      }
      setBadge('sStatus_sdk', 'loaded', 'ok');
      el('hAppId').textContent = imiEnvironments.default.asset.appId;
      log(`SDK loaded · appId=${imiEnvironments.default.asset.appId}`, 'ok');

      // Pre-fill a guest userId
      el('userId').value = 'guest-' + Math.random().toString(36).slice(2, 10) + '-' + Date.now().toString(36);
      return true;
    }

    // ── 1. Startup ───────────────────────────────────────────────
    function startup() {
      try {
        IMI.IMIconnect.startup();
        setBadge('sStatus_startup', 'ok', 'ok');
        log('IMIconnect.startup() called', 'ok');
        return true;
      } catch (e) {
        setBadge('sStatus_startup', 'failed', 'err');
        log('startup() threw: ' + (e?.message || e), 'err');
        return false;
      }
    }

    // ── 2. Register a guest device ───────────────────────────────
    function registerGuest() {
      const userId = el('userId').value.trim() || ('guest-' + Date.now());
      currentUserId = userId;
      const deviceId = userId + '-' + Date.now();
      log(`Registering · userId=${userId} · deviceId=${deviceId}`, 'info');

      // ICDeviceProfile signature in 2022 sample: new ICDeviceProfile(deviceID, userID)
      const deviceProfile = new IMI.ICDeviceProfile(deviceId, userId);

      IMI.IMIconnect.register(deviceProfile, {
        onSuccess: (msg) => {
          setBadge('sStatus_register', 'registered', 'ok');
          log('register onSuccess: ' + JSON.stringify(msg), 'ok');
          el('btnUnregister').disabled = false;
          el('btnConnect').disabled = false;
          el('btnNewThread').disabled = false;
          el('btnFetchThreads').disabled = false;
          el('btnRegister').disabled = true;
          // Auto-connect after register (matches sample app pattern)
          attachMessageListener();
          connect();
        },
        onFailure: (err) => {
          setBadge('sStatus_register', 'failed', 'err');
          log('register onFailure: ' + JSON.stringify(err), 'err');
        }
      });
    }

    function unregister() {
      IMI.IMIconnect.unregister({
        onSuccess: () => {
          setBadge('sStatus_register', 'unregistered', '');
          setBadge('sStatus_conn', 'disconnected', '');
          setBadge('sStatus_thread', 'none', '');
          log('Unregistered', 'ok');
          el('btnRegister').disabled = false;
          el('btnUnregister').disabled = true;
          el('btnConnect').disabled = true;
          el('btnDisconnect').disabled = true;
          el('btnNewThread').disabled = true;
          el('btnFetchThreads').disabled = true;
          el('composer').disabled = true;
          el('btnSend').disabled = true;
          activeThreadId = null;
        },
        onFailure: (err) => log('unregister onFailure: ' + JSON.stringify(err), 'err')
      });
    }

    // ── 3. Connect MQTT/WebSocket and listen ─────────────────────
    function attachMessageListener() {
      const messaging = IMI.ICMessaging.getInstance();
      messaging.setICMessagingReceiver({
        onConnectionStatusChanged: (statusCode) => {
          log('▷ onConnectionStatusChanged: ' + JSON.stringify(statusCode), 'event');
          // statusCode varies — usually a number or { code, status } object
          const code = (statusCode && typeof statusCode === 'object') ? (statusCode.code ?? statusCode.status) : statusCode;
          if (code === 1 || code === 'CONNECTED' || code === 'connected') {
            setBadge('sStatus_conn', 'connected', 'ok');
            el('btnConnect').disabled = true;
            el('btnDisconnect').disabled = false;
          } else if (code === 0 || code === 'DISCONNECTED' || code === 'disconnected') {
            setBadge('sStatus_conn', 'disconnected', 'warn');
            el('btnConnect').disabled = false;
            el('btnDisconnect').disabled = true;
          } else {
            setBadge('sStatus_conn', String(code), 'info');
          }
        },
        onMessageReceived: (message) => {
          handleIncomingMessage(message);
        }
      });
      log('Message listener attached', 'ok');
    }

    // ── Incoming message router: detects pre-chat form template vs plain text ─
    function handleIncomingMessage(message) {
      // Best-effort safe inspection — SDK objects may be class instances OR plain
      let summary;
      try { summary = JSON.stringify(message).slice(0, 300); }
      catch (_) { summary = '[unserializable ICMessage]'; }
      log('▷ onMessageReceived: ' + summary, 'event');
      console.log('onMessageReceived full:', message);

      // 1. Try to detect a form-template attachment (pre-chat form from flow)
      let attachments = null;
      try {
        if (typeof message?.getAttachments === 'function') attachments = message.getAttachments();
        else if (Array.isArray(message?.attachments))      attachments = message.attachments;
      } catch (_) {}

      if (attachments && attachments.length > 0) {
        const att = attachments[0];
        let contentType = null;
        try {
          if (typeof att?.getContentType === 'function') contentType = att.getContentType();
          else contentType = att?.contentType ?? att?.type;
        } catch (_) {}

        const isTemplate = contentType === (IMI.ICContentType && IMI.ICContentType.Template)
                        || String(contentType).toLowerCase().includes('template')
                        || typeof att?.getFields === 'function';

        if (isTemplate) {
          let fields = [];
          try {
            if (typeof att.getFields === 'function') fields = att.getFields() || [];
            else if (Array.isArray(att.fields))     fields = att.fields;
          } catch (_) {}

          let transactionId = null;
          try {
            if (typeof message.getTransactionId === 'function') transactionId = message.getTransactionId();
            else transactionId = message.transactionId;
          } catch (_) {}

          pendingForm = { message, transactionId, fields };
          log(`Pre-chat form received · ${fields.length} field(s) · txn=${transactionId}`, 'event');
          renderForm(fields);
          return;
        }
      }

      // 2. Otherwise: treat as plain text agent message
      const text = (typeof message?.getMessage === 'function' && message.getMessage())
                || message?.message?.text
                || message?.text
                || message?.payload?.text
                || message?.body
                || summary;
      const from = message?.from || message?.sender || 'agent';
      addMsg(text, 'in', from);
    }

    // ── Render incoming form fields inside the chat preview ─────
    function renderForm(fields) {
      const container = document.createElement('div');
      container.className = 'msg in';
      container.style.maxWidth = '90%';

      const title = document.createElement('div');
      title.style.fontWeight = '600';
      title.style.marginBottom = '6px';
      title.textContent = 'Pre-chat form';
      container.appendChild(title);

      const form = document.createElement('form');
      form.id = 'preChatForm';

      fields.forEach((f) => {
        let name, label, type, mandatory, options;
        try { name      = (typeof f.getName      === 'function') ? f.getName()      : f.name; } catch (_) {}
        try { label     = (typeof f.getLabel     === 'function') ? f.getLabel()     : f.label; } catch (_) {}
        try { type      = (typeof f.getType      === 'function') ? f.getType()      : f.type; } catch (_) {}
        try { mandatory = (typeof f.getMandatory === 'function') ? f.getMandatory() : f.mandatory; } catch (_) {}
        try { options   = (typeof f.getOptions   === 'function') ? f.getOptions()   : f.options; } catch (_) {}

        const row = document.createElement('div');
        row.style.marginBottom = '8px';

        const lab = document.createElement('label');
        lab.textContent = (label || name) + (mandatory ? ' *' : '');
        lab.style.color = '#1d1d1f';
        lab.style.fontSize = '12px';
        row.appendChild(lab);

        let input;
        const typeStr = String(type || '').toLowerCase();
        if (typeStr.includes('dropdown') || (Array.isArray(options) && options.length)) {
          input = document.createElement('select');
          (options || []).forEach((opt) => {
            const o = document.createElement('option');
            o.value = opt; o.textContent = opt;
            input.appendChild(o);
          });
        } else {
          input = document.createElement('input');
          input.type = typeStr.includes('email') ? 'email' : 'text';
        }
        input.name = name;
        if (mandatory) input.required = true;
        input.style.width = '100%';
        input.style.padding = '6px 8px';
        input.style.border = '1px solid #d2d2d7';
        input.style.borderRadius = '4px';
        input.style.marginTop = '2px';
        row.appendChild(input);
        form.appendChild(row);
      });

      const submit = document.createElement('button');
      submit.type = 'submit';
      submit.textContent = 'Submit';
      submit.style.marginTop = '4px';
      submit.style.padding = '6px 14px';
      submit.style.width = 'auto';
      form.appendChild(submit);

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const values = {};
        new FormData(form).forEach((v, k) => { values[k] = v; });
        submitFormResponse(values);
        // Disable the form once submitted
        Array.from(form.elements).forEach((el) => { el.disabled = true; });
      });

      container.appendChild(form);
      el('messages').appendChild(container);
      el('messages').scrollTop = el('messages').scrollHeight;
    }

    // ── Submit form response back to the flow (triggers OnFormResponse) ─
    // SDK source analysis: publishMessage with interactiveData does NOT trigger
    // the OnFormResponse server event — it just sends a regular message with
    // an interactiveData property attached, which the platform ignores.
    // The actual mechanism is messaging.sendClickedEvent(tid, interactiveData, cb)
    // which POSTs to /<appId>/deliveryupdate with status:4 — this is what the
    // server recognizes as a form/postback response and emits OnFormResponse for.
    function submitFormResponse(values) {
      if (!pendingForm) {
        log('submitFormResponse: no pending form', 'warn');
        return;
      }
      const { transactionId } = pendingForm;
      log('Submitting form response · txn=' + transactionId + ' · ' + JSON.stringify(values), 'info');

      const messaging = IMI.ICMessaging.getInstance();

      // Probe API surface once — confirm sendClickedEvent exists in this build
      if (typeof messaging.sendClickedEvent !== 'function') {
        log('[diag] messaging.sendClickedEvent NOT FOUND on ICMessaging instance', 'err');
        // Dump available methods for debugging
        try {
          const proto = Object.getPrototypeOf(messaging);
          const names = Object.getOwnPropertyNames(proto)
            .filter(n => /click|send|publish|form|interactive|postback/i.test(n));
          log('[diag] candidate methods on messaging: ' + JSON.stringify(names), 'info');
        } catch (_) {}
        return;
      }

      try {
        const interactive = new IMI.ICInteractiveData();
        interactive.setType(IMI.ICInteractiveDataType.FormResponse);
        interactive.setPayload(values);
        // Per SDK source, sendClickedEvent reads getType/getIdentifier/getTitle/
        // getActionURL/getPayload from the interactive data and rebuilds it server-side.
        // setIdentifier with the form's templateId would be ideal but we don't have
        // it on hand — sendClickedEvent works without it for FormResponse.

        log('[diag] calling sendClickedEvent(tid=' + transactionId + ', interactive=' + JSON.stringify(interactive) + ')', 'info');
        console.log('[diag] sendClickedEvent args:', { tid: transactionId, interactive });

        messaging.sendClickedEvent(transactionId, interactive, {
          onSuccess: (resp) => {
            log('sendClickedEvent onSuccess · OnFormResponse should fire in flow', 'ok');
            console.log('sendClickedEvent onSuccess:', resp);
            addMsg('Form submitted · ' + JSON.stringify(values), 'out', 'you');
            pendingForm = null;
          },
          onFailure: (err) => {
            const detail = (err && typeof err === 'object')
              ? JSON.stringify(err, Object.getOwnPropertyNames(err))
              : String(err);
            log('sendClickedEvent onFailure: ' + detail, 'err');
            console.error('sendClickedEvent onFailure object:', err);
          }
        });
      } catch (e) {
        const detail = (e && typeof e === 'object')
          ? (e.message || JSON.stringify(e, Object.getOwnPropertyNames(e)))
          : String(e);
        log('submitFormResponse threw: ' + detail, 'err');
        console.error('submitFormResponse exception:', e);
      }
    }

    function connect() {
      const messaging = IMI.ICMessaging.getInstance();
      if (messaging.isConnected && messaging.isConnected()) {
        log('already connected', 'info');
        setBadge('sStatus_conn', 'connected', 'ok');
        return;
      }
      try {
        messaging.connect();
        log('messaging.connect() called', 'ok');
      } catch (e) {
        log('connect() threw: ' + (e?.message || e), 'err');
      }
    }

    function disconnect() {
      const messaging = IMI.ICMessaging.getInstance();
      try {
        messaging.disconnect();
        log('messaging.disconnect() called', 'ok');
      } catch (e) {
        log('disconnect() threw: ' + (e?.message || e), 'err');
      }
    }

    // ── 4. Threads (use typed IMI.ICThread per official SDK API) ─
    function createThread() {
      const messaging = IMI.ICMessaging.getInstance();
      if (typeof messaging.createThread !== 'function') {
        log('createThread() not available on this SDK build', 'err');
        return;
      }
      const title = 'Farmers support · ' + new Date().toLocaleTimeString();
      log('Creating thread: ' + title, 'info');

      try {
        // Per Webex Connect SDK quickstart: must use new IMI.ICThread() with setters,
        // NOT a plain object literal — the SDK validates parameter type synchronously.
        const thread = new IMI.ICThread();
        thread.setTitle(title);
        if (IMI.ICThreadStatus && IMI.ICThreadStatus.Active != null) {
          thread.setStatus(IMI.ICThreadStatus.Active);
        }
        if (IMI.ICThreadType && IMI.ICThreadType.Conversation != null) {
          thread.setType(IMI.ICThreadType.Conversation);
        }

        messaging.createThread(thread, {
          onSuccess: (threadObj) => {
            // threadObj is the populated ICThread; getId() returns the server-assigned ID
            const tid = (typeof threadObj?.getId === 'function') ? threadObj.getId() : (threadObj?.id || threadObj);
            log('createThread onSuccess · id=' + tid, 'ok');
            console.log('createThread onSuccess full object:', threadObj);
            activeThread = threadObj;     // store the typed object for publishMessage
            activeThreadId = tid;
            setBadge('sStatus_thread', String(tid).slice(0, 12) + '…', 'ok');
            el('composer').disabled = false;
            el('btnSend').disabled = false;
            addMsg('Thread created · ' + tid, 'sys');
          },
          onFailure: (err) => {
            const detail = (err && typeof err === 'object')
              ? JSON.stringify(err, Object.getOwnPropertyNames(err))
              : String(err);
            log('createThread onFailure: ' + detail, 'err');
            console.error('createThread onFailure object:', err);
          }
        });
      } catch (e) {
        const detail = (e && typeof e === 'object')
          ? (e.message || JSON.stringify(e, Object.getOwnPropertyNames(e)))
          : String(e);
        log('createThread() threw: ' + detail, 'err');
        console.error('createThread() exception object:', e);
      }
    }

    function fetchThreads() {
      const messaging = IMI.ICMessaging.getInstance();
      if (typeof messaging.fetchThreads !== 'function') {
        log('fetchThreads() not available', 'err');
        return;
      }
      // v1.8 signature: fetchThreads(beforeDate, limit, callback). null beforeDate = newest.
      messaging.fetchThreads(null, 10, {
        onSuccess: (threads, hasMore) => {
          const count = Array.isArray(threads) ? threads.length : 'n/a';
          log('fetchThreads onSuccess · count=' + count + ' · hasMore=' + hasMore, 'ok');
          console.log('fetchThreads result:', threads);
        },
        onFailure: (err) => log('fetchThreads onFailure: ' + JSON.stringify(err), 'err')
      });
    }

    // ── 5. Send a message (use typed IMI.ICMessage per official SDK API) ─
    function sendMessage() {
      const text = el('composer').value.trim();
      if (!text) return;
      if (!activeThread) {
        log('No active thread — click "Create thread" first', 'warn');
        return;
      }
      const messaging = IMI.ICMessaging.getInstance();
      if (typeof messaging.publishMessage !== 'function') {
        log('publishMessage() not available', 'err');
        return;
      }
      log(`Publishing: "${text}" to thread ${activeThreadId}`, 'info');
      try {
        // Per Webex Connect SDK quickstart: typed ICMessage with setMessage + setThread.
        const message = new IMI.ICMessage();
        message.setMessage(text);
        message.setThread(activeThread);

        messaging.publishMessage(message, {
          onSuccess: (resp) => {
            log('publishMessage onSuccess', 'ok');
            console.log('publishMessage onSuccess full:', resp);
            addMsg(text, 'out', 'you');
            el('composer').value = '';
          },
          onFailure: (err) => {
            const detail = (err && typeof err === 'object')
              ? JSON.stringify(err, Object.getOwnPropertyNames(err))
              : String(err);
            log('publishMessage onFailure: ' + detail, 'err');
            console.error('publishMessage onFailure object:', err);
          }
        });
      } catch (e) {
        const detail = (e && typeof e === 'object')
          ? (e.message || JSON.stringify(e, Object.getOwnPropertyNames(e)))
          : String(e);
        log('publishMessage() threw: ' + detail, 'err');
        console.error('publishMessage() exception object:', e);
      }
    }

    // ── Wire up UI ───────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      if (!preflight()) return;
      if (!startup()) return;

      el('btnRegister').addEventListener('click', registerGuest);
      el('btnUnregister').addEventListener('click', unregister);
      el('btnConnect').addEventListener('click', connect);
      el('btnDisconnect').addEventListener('click', disconnect);
      el('btnNewThread').addEventListener('click', createThread);
      el('btnFetchThreads').addEventListener('click', fetchThreads);
      el('btnSend').addEventListener('click', sendMessage);
      el('composer').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

      log('Ready — click "Register guest" to begin', 'info');
    });
  </script>
</body>
</html>
